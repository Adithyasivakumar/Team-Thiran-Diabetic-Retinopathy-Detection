{% extends "base_doclab.html" %}

{% block title %}Login - Retinex AI{% endblock %}

{% block content %}

<section class="section hero" style="background-image: url('{{ url_for('static', filename='doclab_images/hero-bg.png') }}'); min-height: 100vh; display: flex; align-items: center;" aria-label="login">
  <div class="container" style="display: flex; justify-content: center; width: 100%;">
    <div style="width: 100%; max-width: 560px; background: white; border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); overflow: hidden;">
      
      <!-- Form Header -->
      <div style="background: linear-gradient(135deg, var(--verdigris), var(--ming)); color: var(--white); padding: 24px; font-weight: 600; display: flex; align-items: center; gap: 12px; font-size: 1.1rem;">
        <ion-icon name="log-in-outline" style="font-size: 1.4rem;"></ion-icon>
        Sign In to Retinex AI
      </div>

      <!-- Form Content -->
      <div style="padding: 40px;">
        <form method="POST" action="{{ url_for('login') }}" style="display: grid; gap: 20px;">
          
          <!-- Username Field -->
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-weight: 600; color: var(--eerie-black); font-size: 0.95rem; display: flex; align-items: center; gap: 6px;">
              <ion-icon name="person-outline" style="color: var(--verdigris);"></ion-icon>
              Username
            </label>
            <input type="text" name="username" placeholder="Enter your username" class="input-field" 
                   style="border: 1px solid var(--gainsboro); border-radius: 8px; padding: 12px 14px; font-size: 1rem; transition: all 0.3s;" 
                   onmouseover="this.style.borderColor='var(--verdigris)'; this.style.boxShadow='0 0 0 3px rgba(26, 107, 126, 0.1)'"
                   onmouseout="this.style.borderColor='var(--gainsboro)'; this.style.boxShadow='none'"
                   required>
          </div>

          <!-- Password Field -->
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-weight: 600; color: var(--eerie-black); font-size: 0.95rem; display: flex; align-items: center; gap: 6px;">
              <ion-icon name="lock-closed-outline" style="color: var(--verdigris);"></ion-icon>
              Password
            </label>
            <input type="password" name="password" placeholder="Enter your password" class="input-field" 
                   style="border: 1px solid var(--gainsboro); border-radius: 8px; padding: 12px 14px; font-size: 1rem; transition: all 0.3s;" 
                   onmouseover="this.style.borderColor='var(--verdigris)'; this.style.boxShadow='0 0 0 3px rgba(26, 107, 126, 0.1)'"
                   onmouseout="this.style.borderColor='var(--gainsboro)'; this.style.boxShadow='none'"
                   required>
          </div>

          {% if message %}
            <p style="color: var(--ming); font-weight: var(--fw-500); padding: 10px 12px; background: rgba(219, 112, 147, 0.1); border-radius: 6px; border-left: 4px solid var(--ming);">{{ message }}</p>
          {% endif %}

          <button type="submit" class="btn has-before" style="margin-top: 8px; height: 48px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1rem;">
            <ion-icon name="log-in-outline"></ion-icon>
            <span class="span title-md">Login</span>
          </button>
        </form>
      </div>

      <!-- Demo Credentials -->
      <div style="background: var(--alice-blue); padding: 16px 24px; border-top: 1px solid var(--gainsboro); text-align: center;">
        <p style="color: var(--independece); font-size: 0.9rem;">
          <strong>Demo Credentials:</strong><br>
          Username: <code style="background: var(--white); padding: 2px 6px; border-radius: 4px; font-family: monospace;">admin</code> / 
          Password: <code style="background: var(--white); padding: 2px 6px; border-radius: 4px; font-family: monospace;">admin123</code>
        </p>
      </div>
    </div>
  </div>
</section>

{% endblock %}
